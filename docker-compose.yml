services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payload}
      POSTGRES_DB: ${POSTGRES_DB:-journalism}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5
    # Host port for local CLI (migrate / next build) — not required for in-compose app → postgres traffic.
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432'
    networks:
      - internal

  app:
    build:
      context: .
      # Build shares Postgres' network namespace so 127.0.0.1:5432 reaches the DB.
      # Start Postgres first: `docker compose up -d postgres`, then `docker compose build app`.
      network: service:postgres
      args:
        # Build runs in Postgres’ network: DB is always 127.0.0.1 (must match POSTGRES_*).
        DATABASE_URL: postgres://${POSTGRES_USER:-payload}:${POSTGRES_PASSWORD:-payload}@127.0.0.1:5432/${POSTGRES_DB:-journalism}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://payload:payload@postgres:5432/journalism}
      NODE_ENV: production
    volumes:
      - media_uploads:/app/public/media
    expose:
      - '3000'
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

volumes:
  postgres_data:
  media_uploads:

networks:
  internal:
